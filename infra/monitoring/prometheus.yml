global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'scoopdope-backend'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'scoopdope-health'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/health'
    scrape_interval: 30s

  - job_name: 'scoopdope-version'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/health/version'
    scrape_interval: 60s
